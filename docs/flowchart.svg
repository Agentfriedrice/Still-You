<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" preserveAspectRatio="xMidYMid meet" font-family="monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dccfb0" />
    </marker>
    <marker id="arrowDim" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6e88c2" />
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d8a85a" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1100" height="900" fill="#0a0c12" />

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#dccfb0" font-size="20" font-weight="bold" letter-spacing="2">STILL YOU — SYSTEM FLOWCHART</text>
  <text x="550" y="60" text-anchor="middle" fill="#888888" font-size="11">input → movement → collision → dialogue → choice → memory → doorway → ending</text>

  <!-- ========================================================== -->
  <!-- Top row: the per-frame loop -->
  <!-- ========================================================== -->
  <text x="40" y="100" fill="#6e88c2" font-size="11" letter-spacing="2">PER-FRAME GAME LOOP</text>
  <line x1="40" y1="108" x2="1060" y2="108" stroke="#1a2848" stroke-width="1" />

  <!-- Input -->
  <rect x="40"  y="125" width="140" height="60" rx="4" fill="#0d111c" stroke="#6e88c2" stroke-width="1.5"/>
  <text x="110" y="150" text-anchor="middle" fill="#dccfb0" font-size="12" font-weight="bold">Keyboard Input</text>
  <text x="110" y="168" text-anchor="middle" fill="#aaaaaa" font-size="10">WASD · E · Q</text>

  <!-- Movement -->
  <rect x="210" y="125" width="140" height="60" rx="4" fill="#0d111c" stroke="#6e88c2" stroke-width="1.5"/>
  <text x="280" y="150" text-anchor="middle" fill="#dccfb0" font-size="12" font-weight="bold">Player Movement</text>
  <text x="280" y="168" text-anchor="middle" fill="#aaaaaa" font-size="10">velocity + clamp</text>

  <!-- Proximity -->
  <rect x="380" y="125" width="140" height="60" rx="4" fill="#0d111c" stroke="#6e88c2" stroke-width="1.5"/>
  <text x="450" y="150" text-anchor="middle" fill="#dccfb0" font-size="12" font-weight="bold">Proximity Check</text>
  <text x="450" y="168" text-anchor="middle" fill="#aaaaaa" font-size="10">distance &lt; 55px</text>

  <!-- Dialogue -->
  <rect x="550" y="125" width="140" height="60" rx="4" fill="#0d111c" stroke="#6e88c2" stroke-width="1.5"/>
  <text x="620" y="150" text-anchor="middle" fill="#dccfb0" font-size="12" font-weight="bold">Dialogue Machine</text>
  <text x="620" y="168" text-anchor="middle" fill="#aaaaaa" font-size="10">initial · prompt · response</text>

  <!-- Choice -->
  <rect x="720" y="125" width="140" height="60" rx="4" fill="#0d111c" stroke="#6e88c2" stroke-width="1.5"/>
  <text x="790" y="150" text-anchor="middle" fill="#dccfb0" font-size="12" font-weight="bold">Choice Commit</text>
  <text x="790" y="168" text-anchor="middle" fill="#aaaaaa" font-size="10">playerChoices[hw][id]</text>

  <!-- Doorway trigger -->
  <rect x="890" y="125" width="170" height="60" rx="4" fill="#0d111c" stroke="#6e88c2" stroke-width="1.5"/>
  <text x="975" y="150" text-anchor="middle" fill="#dccfb0" font-size="12" font-weight="bold">Doorway Trigger</text>
  <text x="975" y="168" text-anchor="middle" fill="#aaaaaa" font-size="10">all memories handled?</text>

  <!-- Arrows for top row -->
  <line x1="180" y1="155" x2="210" y2="155" stroke="#6e88c2" stroke-width="1.5" marker-end="url(#arrowDim)" />
  <line x1="350" y1="155" x2="380" y2="155" stroke="#6e88c2" stroke-width="1.5" marker-end="url(#arrowDim)" />
  <line x1="520" y1="155" x2="550" y2="155" stroke="#6e88c2" stroke-width="1.5" marker-end="url(#arrowDim)" />
  <line x1="690" y1="155" x2="720" y2="155" stroke="#6e88c2" stroke-width="1.5" marker-end="url(#arrowDim)" />
  <line x1="860" y1="155" x2="890" y2="155" stroke="#6e88c2" stroke-width="1.5" marker-end="url(#arrowDim)" />

  <!-- ========================================================== -->
  <!-- Dialogue state machine (middle left) -->
  <!-- ========================================================== -->
  <text x="40" y="240" fill="#7ab086" font-size="11" letter-spacing="2">DIALOGUE STATE MACHINE</text>
  <line x1="40" y1="248" x2="520" y2="248" stroke="#1c3624" stroke-width="1" />

  <rect x="60"  y="280" width="100" height="46" rx="4" fill="#0d1810" stroke="#7ab086" stroke-width="1.5"/>
  <text x="110" y="302" text-anchor="middle" fill="#dccfb0" font-size="12">closed</text>
  <text x="110" y="316" text-anchor="middle" fill="#aaaaaa" font-size="9">(idle)</text>

  <rect x="200" y="280" width="100" height="46" rx="4" fill="#0d1810" stroke="#7ab086" stroke-width="1.5"/>
  <text x="250" y="302" text-anchor="middle" fill="#dccfb0" font-size="12">initial</text>
  <text x="250" y="316" text-anchor="middle" fill="#aaaaaa" font-size="9">opening lines</text>

  <rect x="340" y="280" width="100" height="46" rx="4" fill="#0d1810" stroke="#7ab086" stroke-width="1.5"/>
  <text x="390" y="302" text-anchor="middle" fill="#dccfb0" font-size="12">prompt</text>
  <text x="390" y="316" text-anchor="middle" fill="#aaaaaa" font-size="9">3 choices</text>

  <rect x="480" y="280" width="100" height="46" rx="4" fill="#0d1810" stroke="#7ab086" stroke-width="1.5"/>
  <text x="530" y="302" text-anchor="middle" fill="#dccfb0" font-size="12">response</text>
  <text x="530" y="316" text-anchor="middle" fill="#aaaaaa" font-size="9">echo line</text>

  <!-- Transitions -->
  <line x1="160" y1="303" x2="200" y2="303" stroke="#7ab086" stroke-width="1.5" marker-end="url(#arrowDim)" />
  <text x="180" y="296" text-anchor="middle" fill="#7ab086" font-size="9">E</text>

  <line x1="300" y1="303" x2="340" y2="303" stroke="#7ab086" stroke-width="1.5" marker-end="url(#arrowDim)" />
  <text x="320" y="296" text-anchor="middle" fill="#7ab086" font-size="9">E</text>

  <line x1="440" y1="303" x2="480" y2="303" stroke="#7ab086" stroke-width="1.5" marker-end="url(#arrowDim)" />
  <text x="460" y="296" text-anchor="middle" fill="#7ab086" font-size="9">E</text>

  <!-- W/S loop on prompt -->
  <path d="M 390 280 C 390 250, 400 240, 410 245 C 420 250, 410 270, 400 275" fill="none" stroke="#7ab086" stroke-width="1.5" stroke-dasharray="3,2" />
  <text x="430" y="252" text-anchor="middle" fill="#7ab086" font-size="9">W/S cursor</text>

  <!-- Back to closed from response -->
  <path d="M 530 326 Q 530 380 110 380 Q 110 360 110 326" fill="none" stroke="#7ab086" stroke-width="1.5" marker-end="url(#arrowDim)" />
  <text x="320" y="395" text-anchor="middle" fill="#7ab086" font-size="9">E (closes dialogue)</text>

  <!-- ========================================================== -->
  <!-- Memory model (middle right) -->
  <!-- ========================================================== -->
  <text x="600" y="240" fill="#d8a85a" font-size="11" letter-spacing="2">MEMORY MODEL</text>
  <line x1="600" y1="248" x2="1060" y2="248" stroke="#3a2814" stroke-width="1" />

  <rect x="620" y="280" width="420" height="120" rx="4" fill="#1c1208" stroke="#d8a85a" stroke-width="1.5"/>
  <text x="830" y="305" text-anchor="middle" fill="#dccfb0" font-size="12" font-weight="bold">memoryDefinitions[year].memories[i]</text>

  <text x="640" y="332" fill="#dccfb0" font-size="11">id, x, y, color, icon</text>
  <text x="640" y="350" fill="#dccfb0" font-size="11">initial: "you found..."</text>
  <text x="640" y="368" fill="#dccfb0" font-size="11">prompt:  "what do you do?"</text>
  <text x="640" y="386" fill="#dccfb0" font-size="11">choices: [ keep · leave · pass_on ]</text>

  <text x="900" y="332" fill="#888888" font-size="10">writes to:</text>
  <text x="900" y="350" fill="#d8a85a" font-size="11">playerChoices</text>
  <text x="900" y="368" fill="#d8a85a" font-size="11">  [hallwayId]</text>
  <text x="900" y="386" fill="#d8a85a" font-size="11">    [memoryId] = choice</text>

  <!-- ========================================================== -->
  <!-- Multi-hallway flow (bottom) -->
  <!-- ========================================================== -->
  <text x="40" y="460" fill="#dccfb0" font-size="11" letter-spacing="2">MULTI-HALLWAY FLOW</text>
  <line x1="40" y1="468" x2="1060" y2="468" stroke="#3a3630" stroke-width="1" />

  <!-- Year 1 -->
  <rect x="40"  y="500" width="200" height="120" rx="4" fill="#0d111c" stroke="#6e88c2" stroke-width="2"/>
  <text x="140" y="523" text-anchor="middle" fill="#6e88c2" font-size="13" font-weight="bold">YEAR 1 — Arrival</text>
  <text x="140" y="542" text-anchor="middle" fill="#aaaaaa" font-size="10">5 memories</text>
  <text x="140" y="556" text-anchor="middle" fill="#aaaaaa" font-size="10">world: cool blue</text>
  <text x="140" y="570" text-anchor="middle" fill="#aaaaaa" font-size="10">outfit: blue/gray</text>
  <text x="140" y="588" text-anchor="middle" fill="#dccfb0" font-size="10" font-style="italic">"what you brought"</text>
  <rect x="60"  y="600" width="160" height="12" rx="2" fill="#0a1224" stroke="#1a3258" stroke-width="1"/>
  <text x="140" y="610" text-anchor="middle" fill="#6e88c2" font-size="9">doorway: year 2 begins</text>

  <!-- Year 2 -->
  <rect x="270" y="500" width="200" height="120" rx="4" fill="#0d1810" stroke="#7ab086" stroke-width="2"/>
  <text x="370" y="523" text-anchor="middle" fill="#7ab086" font-size="13" font-weight="bold">YEAR 2 — Settling</text>
  <text x="370" y="542" text-anchor="middle" fill="#aaaaaa" font-size="10">5 memories</text>
  <text x="370" y="556" text-anchor="middle" fill="#aaaaaa" font-size="10">world: dim green</text>
  <text x="370" y="570" text-anchor="middle" fill="#aaaaaa" font-size="10">outfit: muted green</text>
  <text x="370" y="588" text-anchor="middle" fill="#dccfb0" font-size="10" font-style="italic">"what you started keeping"</text>
  <rect x="290" y="600" width="160" height="12" rx="2" fill="#0b1a10" stroke="#224a2e" stroke-width="1"/>
  <text x="370" y="610" text-anchor="middle" fill="#7ab086" font-size="9">doorway: year 3 begins</text>

  <!-- Year 3 -->
  <rect x="500" y="500" width="200" height="120" rx="4" fill="#1c1208" stroke="#d8a85a" stroke-width="2"/>
  <text x="600" y="523" text-anchor="middle" fill="#d8a85a" font-size="13" font-weight="bold">YEAR 3 — Reckoning</text>
  <text x="600" y="542" text-anchor="middle" fill="#aaaaaa" font-size="10">5 memories</text>
  <text x="600" y="556" text-anchor="middle" fill="#aaaaaa" font-size="10">world: amber</text>
  <text x="600" y="570" text-anchor="middle" fill="#aaaaaa" font-size="10">outfit: amber/rust</text>
  <text x="600" y="588" text-anchor="middle" fill="#dccfb0" font-size="10" font-style="italic">"what you weighed"</text>
  <rect x="520" y="600" width="160" height="12" rx="2" fill="#180e06" stroke="#4e3415" stroke-width="1"/>
  <text x="600" y="610" text-anchor="middle" fill="#d8a85a" font-size="9">doorway: year 4 begins</text>

  <!-- Year 4 -->
  <rect x="730" y="500" width="200" height="120" rx="4" fill="#1c1a14" stroke="#dccfb0" stroke-width="2"/>
  <text x="830" y="523" text-anchor="middle" fill="#dccfb0" font-size="13" font-weight="bold">YEAR 4 — Becoming</text>
  <text x="830" y="542" text-anchor="middle" fill="#aaaaaa" font-size="10">5 memories</text>
  <text x="830" y="556" text-anchor="middle" fill="#aaaaaa" font-size="10">world: warm white</text>
  <text x="830" y="570" text-anchor="middle" fill="#aaaaaa" font-size="10">outfit: cream/khaki</text>
  <text x="830" y="588" text-anchor="middle" fill="#dccfb0" font-size="10" font-style="italic">"what you carry out"</text>
  <rect x="750" y="600" width="160" height="12" rx="2" fill="#18160f" stroke="#4a443a" stroke-width="1"/>
  <text x="830" y="610" text-anchor="middle" fill="#dccfb0" font-size="9">final doorway</text>

  <!-- Final ending -->
  <rect x="950" y="500" width="100" height="120" rx="4" fill="#000000" stroke="#dccfb0" stroke-width="2"/>
  <text x="1000" y="528" text-anchor="middle" fill="#dccfb0" font-size="12" font-weight="bold">ENDING</text>
  <text x="1000" y="552" text-anchor="middle" fill="#aaaaaa" font-size="9">(1) recap × 4</text>
  <text x="1000" y="566" text-anchor="middle" fill="#aaaaaa" font-size="9">per-year line</text>
  <text x="1000" y="584" text-anchor="middle" fill="#aaaaaa" font-size="9">(2) cumulative</text>
  <text x="1000" y="598" text-anchor="middle" fill="#aaaaaa" font-size="9">closing line</text>
  <text x="1000" y="614" text-anchor="middle" fill="#dccfb0" font-size="10" font-style="italic">"you're still you."</text>

  <!-- Arrows between years -->
  <line x1="240" y1="560" x2="270" y2="560" stroke="#dccfb0" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="470" y1="560" x2="500" y2="560" stroke="#dccfb0" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="700" y1="560" x2="730" y2="560" stroke="#dccfb0" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="930" y1="560" x2="950" y2="560" stroke="#dccfb0" stroke-width="2" marker-end="url(#arrow)" />

  <!-- E label on arrows -->
  <text x="255" y="554" text-anchor="middle" fill="#dccfb0" font-size="9">[E]</text>
  <text x="485" y="554" text-anchor="middle" fill="#dccfb0" font-size="9">[E]</text>
  <text x="715" y="554" text-anchor="middle" fill="#dccfb0" font-size="9">[E]</text>
  <text x="940" y="554" text-anchor="middle" fill="#dccfb0" font-size="9">[E]</text>

  <!-- [Q] backtrack arrows curving back to each year -->
  <path d="M 280 620 Q 250 660 200 660 Q 150 660 140 622" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)" opacity="0.65" />
  <text x="200" y="675" text-anchor="middle" fill="#888888" font-size="9">[Q] go back · revise choices</text>

  <path d="M 510 620 Q 480 660 430 660 Q 380 660 370 622" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)" opacity="0.65" />
  <path d="M 740 620 Q 710 660 660 660 Q 610 660 600 622" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)" opacity="0.65" />
  <path d="M 960 620 Q 930 660 880 660 Q 840 660 830 622" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)" opacity="0.65" />

  <!-- Restart loop from ending back to Year 1 -->
  <path d="M 1000 620 Q 1000 760 540 760 Q 80 760 80 620" fill="none" stroke="#dccfb0" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)" />
  <text x="540" y="775" text-anchor="middle" fill="#dccfb0" font-size="10">[E] on the final doorway · play again, clean slate</text>

  <!-- ========================================================== -->
  <!-- Doorway lifecycle (bottom inset) -->
  <!-- ========================================================== -->
  <text x="40" y="810" fill="#dccfb0" font-size="11" letter-spacing="2">DOORWAY LIFECYCLE</text>
  <line x1="40" y1="818" x2="1060" y2="818" stroke="#3a3630" stroke-width="1" />

  <text x="60"  y="844" fill="#aaaaaa" font-size="11">[1]</text>
  <text x="90"  y="844" fill="#dccfb0" font-size="11">player enters doorway zone</text>

  <text x="320" y="844" fill="#aaaaaa" font-size="11">[2]</text>
  <text x="350" y="844" fill="#dccfb0" font-size="11">all memories handled? → overlay fades in</text>

  <text x="60"  y="868" fill="#aaaaaa" font-size="11">[3a]</text>
  <text x="90"  y="868" fill="#dccfb0" font-size="11">[E] continue → tween out → next hallway</text>

  <text x="320" y="868" fill="#aaaaaa" font-size="11">[3b]</text>
  <text x="350" y="868" fill="#dccfb0" font-size="11">[Q] go back → tween out → player nudged back into hallway</text>

  <text x="60"  y="888" fill="#aaaaaa" font-size="11">[4]</text>
  <text x="90"  y="888" fill="#dccfb0" font-size="11">final year: [E] restarts the game (clears playerChoices, reloads Year 1)</text>
</svg>
